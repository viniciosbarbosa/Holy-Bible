<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#AA7C11" />
      <stop offset="25%" stop-color="#F2C542" />
      <stop offset="50%" stop-color="#FFDF73" />
      <stop offset="75%" stop-color="#F2C542" />
      <stop offset="100%" stop-color="#966F0F" />
    </linearGradient>
    <filter id="gold-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Beautiful Open Bible Pages -->
  <path d="M 256,430 C 210,390 120,380 40,410 L 40,110 C 120,80 210,90 256,130 C 302,90 392,80 472,110 L 472,410 C 392,380 302,390 256,430 Z" 
        fill="none" 
        stroke="url(#gold-grad)" 
        stroke-width="24" 
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#gold-glow)" />
        
  <!-- Center Book Spine / Separator -->
  <line x1="256" y1="130" x2="256" y2="430" 
        stroke="url(#gold-grad)" 
        stroke-width="16" 
        stroke-linecap="round" 
        filter="url(#gold-glow)" />

  <!-- Elegant Sacred Cross -->
  <g>
    <!-- Vertical bar -->
    <path d="M 256,180 L 256,360" 
          stroke="url(#gold-grad)" 
          stroke-width="24" 
          stroke-linecap="round" 
          filter="url(#gold-glow)" />
    <!-- Horizontal bar -->
    <path d="M 200,240 L 312,240" 
          stroke="url(#gold-grad)" 
          stroke-width="24" 
          stroke-linecap="round" 
          filter="url(#gold-glow)" />
  </g>
</svg>
